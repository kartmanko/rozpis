<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FARMA 18 — rozpis kameramanov</title>
    <meta name="description" content="Rozpis kameramanov pre FARMA 18" />
    <script>
      // Nastavenie témy pred vykreslením (bez "bliknutia" nesprávnou témou).
      // Predvolená je tmavá ("Broadcast") — svetlá sa zapne iba ak si ju používateľ
      // vyslovene zvolil, alebo zvolil "auto" a systém je nastavený na svetlý režim.
      (function () {
        try {
          var t = localStorage.getItem("rozpis_theme") || "dark";
          var light = t === "light" || (t === "system" && window.matchMedia && window.matchMedia("(prefers-color-scheme: light)").matches);
          if (light) {
            document.documentElement.classList.add("light");
            document.documentElement.style.colorScheme = "light";
          } else {
            document.documentElement.style.colorScheme = "dark";
          }
        } catch (e) {}
      })();
    </script>
