<!doctype html>
<html lang="sk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FARMA 18 — rozpis kameramanov</title>
    <meta name="description" content="Rozpis kameramanov pre FARMA 18" />
    <link rel="icon" type="image/png" href="https://d8j0ntlcm91z4.cloudfront.net/user_37iEesWSHZC3xkmRvCrIzsuTDdf/hf_20260720_220459_23ea6bd4-6481-4152-8193-66349c9362c9.png" />
    <link rel="apple-touch-icon" href="https://d8j0ntlcm91z4.cloudfront.net/user_37iEesWSHZC3xkmRvCrIzsuTDdf/hf_20260720_220459_23ea6bd4-6481-4152-8193-66349c9362c9.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#0f172a" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8fafc" media="(prefers-color-scheme: light)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="FARMA 18" />
    <script>
      // Nastav tému (light/dark/system) ešte pred vykreslením appky, nech nie je vidno bliknutie zlej témy.
      (function () {
        try {
          var t = localStorage.getItem("rozpis_theme") || "system";
          var dark = t === "dark" || (t === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.classList.toggle("dark", dark);
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
